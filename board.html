<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PathFlow Board</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/board.css">

</head>

<body>

<header>

    <div class="left">

        <button id="backBtn">← Dashboard</button>

        <h1 id="boardTitle"></h1>

    </div>

    <div class="right">

        <input
            type="text"
            id="searchInput"
            placeholder="Search tasks...">

        <button id="addTaskBtn">
            + Add Task
        </button>

    </div>

</header>

<div class="board">

    <div class="column">

        <div class="column-header">
            <h2>To Do</h2>
            <span id="todoCount">0</span>
        </div>

        <div class="task-list"
             id="todo"
             data-column="todo">

        </div>

    </div>

    <div class="column">

        <div class="column-header">
            <h2>Doing</h2>
            <span id="doingCount">0</span>
        </div>

        <div class="task-list"
             id="doing"
             data-column="doing">

        </div>

    </div>

    <div class="column">

        <div class="column-header">
            <h2>Review</h2>
            <span id="reviewCount">0</span>
        </div>

        <div class="task-list"
             id="review"
             data-column="review">

        </div>

    </div>

    <div class="column">

        <div class="column-header">
            <h2>Complete</h2>
            <span id="completeCount">0</span>
        </div>

        <div class="task-list"
             id="complete"
             data-column="complete">

        </div>

    </div>

</div>

<script src="js/storage.js"></script>
<script src="js/board.js"></script>
<script src="js/dragdrop.js"></script>

</body>

</html>
