<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>PathFlow Login</title>

    <link rel="stylesheet" href="css/login.css">

</head>

<body>

<div class="container">

    <div class="login-card">

        <h1>PathFlow</h1>

        <p>Project Management Made Easy</p>

        <input
            id="username"
            type="text"
            placeholder="Username">

        <input
            id="password"
            type="password"
            placeholder="Password">

        <button id="loginBtn">
            Login
        </button>

    </div>

</div>

<script src="js/login.js" defer></script>

</body>

</html>
